name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy preview to gh-pages branch
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PREVIEW_DIR="pr-${PR_NUMBER}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save PR files to a temp dir
          TMPDIR=$(mktemp -d)
          rsync -a --exclude='.git' --exclude='.github' . "$TMPDIR/"

          # Switch to gh-pages (fetch or create)
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Clean out old preview for this PR and copy new files in
          rm -rf "${PREVIEW_DIR}"
          mkdir -p "${PREVIEW_DIR}"
          rsync -a "$TMPDIR/" "${PREVIEW_DIR}/"

          git add -A
          git diff --cached --quiet || git commit -m "Preview for PR #${PR_NUMBER}"
          git push origin gh-pages

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://faunt.github.io/Sausage-Cat/pr-${prNumber}/`;
            const body = `## Preview deployed\n\n` +
              `- **Sausage Cats TD:** ${previewUrl}sausage-cats-td.html\n` +
              `- **Capybara Spelling Race:** ${previewUrl}cat-capybara-spelling-race.html\n\n` +
              `Preview updates automatically when you push new commits.`;

            // Check if we already commented
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview deployed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
