name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy main to gh-pages root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save main branch files to a temp dir
          TMPDIR=$(mktemp -d)
          # Copy everything except .git and .github
          rsync -a --exclude='.git' --exclude='.github' . "$TMPDIR/"

          # Switch to gh-pages (fetch or create)
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Remove all root files but keep pr-* preview dirs
          for item in *; do
            case "$item" in
              pr-*) ;;
              *) rm -rf "$item" ;;
            esac
          done

          # Copy main content into root
          rsync -a "$TMPDIR/" .

          git add -A
          git diff --cached --quiet || git commit -m "Deploy main to Pages"
          git push origin gh-pages
